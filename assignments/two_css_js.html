<html>
<head>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<ol>
  <li>FRONTEND DEVELOPMENT
    <ul>
      <li id="f1">HTML5</li>
      <li id="f2">CSS3</li>
      <li id="f3">JavaScript</li>
    </ul>
  </li>
  <li>STYLING & FRAMEWORK
    <ul>
      <li id="s1">Bootstrap</li>
      <li id="s2">Tailwind CSS</li>
    </ul>
  </li>
  <li>TOOLS & PLATFORMS
    <ul>
      <li id="t1">Git</li>
      <li id="t2">GitHub</li>
      <li id="t3">VS Code</li>
    </ul>
  </li>
</ol>
<button onclick="changeSkill()">CLICK ME TO CHANGE SKILL</button>
<script>
function changeSkill(){
  let c = prompt("Select Category:\n1-Frontend\n2-Styling\n3-Tools");
  let id = "";
  if(c == 1){
    let i = prompt("Select Skill Number (1-3)");
    if(i == 1) id = "f1";
    else if(i == 2) id = "f2";
    else if(i == 3) id = "f3";
    else {
      alert("Invalid skill");
      return;
    }
  }
  else if(c == 2){
    let i = prompt("Select Skill Number (1-2)");
    if(i == 1) id = "s1";
    else if(i == 2) id = "s2";
    else {
      alert("Invalid skill");
      return;
    }
  }
  else if(c == 3){
    let i = prompt("Select Skill Number (1-3)");
    if(i == 1) id = "t1";
    else if(i == 2) id = "t2";
    else if(i == 3) id = "t3";
    else {
      alert("Invalid skill");
      return;
    }
  }
  else{
    alert("Invalid category");
    return;
  }
  let newSkill = prompt("Enter new skill");
  document.getElementById(id).innerHTML = newSkill;
  alert("Updated!");
}
</script>  
<p><a href="https://saheema919-svg.github.io/sem4-fet">My Homepage</a></p> 
</body>
</html>
